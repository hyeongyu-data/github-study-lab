name: Study Check

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check-notes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: List study notes
        run: ls -la notes

      - name: Check day 08 note exists
        run: test -f notes/day-08.md
