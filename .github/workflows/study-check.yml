name: Study Check

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check-notes:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        note:
          - day-10.md
          - day-11.md
          - day-12.md
        check:
          - exists
          - has-title

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      - name: List study notes
        run: ls -la notes

      - name: Run matrix note check
        run: |
          case "${{ matrix.check }}" in
            exists)
              test -f "notes/${{ matrix.note }}"
              ;;
            has-title)
              grep -q "^# Day" "notes/${{ matrix.note }}"
              ;;
            *)
              echo "Unknown check: ${{ matrix.check }}"
              exit 1
              ;;
          esac

  check-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      - name: Check README exists
        run: test -f README.md

      - name: Check README mentions day 12
        run: grep -q "day-12.md" README.md

  summarize-study:
    runs-on: ubuntu-latest
    needs:
      - check-notes
      - check-readme

    steps:
      - name: Print summary
        run: echo "Study checks passed after notes and README validation."
